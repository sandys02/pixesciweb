      function initApollo(){

        o.defer=true;
        o.onload=function(){
          try {
            window.trackingFunctions.onLoad({appId:"694ef77a3dccdd001cf4d118"});
          } catch(e) {}

        o.onerror=function(){};
        document.head.appendChild(o);
      }
