services:
  web:
    build:
      context: .
      target: deps
    env_file:
      - path: .env.docker
        required: false
      - path: .env.local
        required: false
    ports:
      - "${PIXESCI_WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      DOWNLOAD_DB_PATH: /data/download.db
      PORTAL_DATABASE_ENV: ${PORTAL_DATABASE_ENV:-development}
    volumes:
      - .:/app
      - pixesci-node-modules:/app/node_modules
      - pixesci-next-cache:/app/.next
      - pixesci-data:/data
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

  setup:
    build:
      context: .
      target: builder
    env_file:
      - path: .env.docker
        required: false
      - path: .env.local
        required: false
    profiles:
      - setup
    environment:
      DOWNLOAD_DB_PATH: /data/download.db
      PORTAL_DATABASE_ENV: ${PORTAL_DATABASE_ENV:-development}
    volumes:
      - pixesci-data:/data
    command: npm run db:push

volumes:
  pixesci-data:
  pixesci-next-cache:
  pixesci-node-modules:
